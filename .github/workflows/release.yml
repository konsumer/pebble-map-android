name: Release

# When you publish a GitHub Release, build both halves and attach the raw .apk and .pbw
# as release assets. Release assets download as raw files (unlike workflow artifacts, which
# the Actions UI always zips).
on:
  release:
    types: [published]

permissions:
  contents: write # needed to upload release assets

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install platform 36
        run: yes | sdkmanager "platforms;android-36" >/dev/null

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.13"

      - name: Build APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Attach APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk pebble-maps-nav.apk
          gh release upload "${{ github.event.release.tag_name }}" pebble-maps-nav.apk --clobber

  watchapp:
    name: Watchapp PBW
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: pebble build
        run: |
          mkdir -p dist
          docker run --rm \
            -v "${{ github.workspace }}/watchapp":/src:ro \
            -v "${{ github.workspace }}/dist":/out \
            rebble/pebble-sdk \
            bash -c 'set -e; cp -r /src ~/app && cd ~/app && pebble build && cp build/*.pbw /out/'

      - name: Attach PBW to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp dist/*.pbw pebble-maps-nav.pbw
          gh release upload "${{ github.event.release.tag_name }}" pebble-maps-nav.pbw --clobber
